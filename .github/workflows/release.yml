name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on origin)"
        required: true

jobs:
  smoke-test:
    name: Build and test on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install build and test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libpulse-dev \
            libx11-dev libxext-dev \
            xvfb

      - name: Build and run all tests
        run: xvfb-run ./build.sh

  build-linux:
    name: Build Linux release binaries
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libpulse-dev \
            libx11-dev libxext-dev

      - name: Build Linux GUI binary
        run: |
          ./build_opt.sh
          mv beebjit beebjit-linux-x86_64

      - name: Build Linux headless binary
        run: |
          ./build_headless_opt.sh
          mv beebjit beebjit-headless-linux-x86_64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            beebjit-linux-x86_64
            beebjit-headless-linux-x86_64
          if-no-files-found: error

  build-windows:
    name: Build Windows release binaries
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install mingw-w64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build Windows GUI binary
        run: |
          ./build_win_opt.sh
          mv beebjit.exe beebjit-windows-x86_64.exe

      - name: Build Windows headless binary
        run: |
          ./build_headless_win_opt.sh
          mv beebjit-headless.exe beebjit-headless-windows-x86_64.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            beebjit-windows-x86_64.exe
            beebjit-headless-windows-x86_64.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: ./artifacts/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: ./artifacts/

      - name: Compose release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          # Find the previous release tag (if any) so we can ask the GitHub
          # API for an auto-generated commit/PR list since then.
          PREV_TAG=$(gh release list \
            --repo "${GITHUB_REPOSITORY}" \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // ""')

          GENERATED=""
          if [ -n "${PREV_TAG}" ] && [ "${PREV_TAG}" != "${TAG_NAME}" ]; then
            GENERATED=$(gh api \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${TAG_NAME}" \
              -f previous_tag_name="${PREV_TAG}" \
              --jq .body)
          fi

          {
            echo "Fork of [scarybeasts/beebjit](https://github.com/scarybeasts/beebjit)."
            echo ""
            echo "Fork changes:"
            echo ""
            echo "- \`-log-stderr\` flag, separating diagnostic output from emulated"
            echo "  terminal output when running with \`-terminal -headless\`."
            echo "- Windows headless build via \`BEEBJIT_HEADLESS\`, producing a GUI-free"
            echo "  \`beebjit-headless.exe\`."
            echo "- Linux mmap address-band fix to avoid intermittent startup failures"
            echo "  on some Linux configurations."
            echo ""
            echo "See [FORK-CHANGES.md](https://github.com/${GITHUB_REPOSITORY}/blob/master/FORK-CHANGES.md)"
            echo "for the dated change list."
            echo ""
            echo "beebjit is GPLv3 (see \`COPYING\` in the source). The binaries attached"
            echo "to this release are built from the source archive also attached."
            if [ -n "${GENERATED}" ]; then
              echo ""
              echo "---"
              echo ""
              echo "${GENERATED}"
            else
              echo ""
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/commits/${TAG_NAME}"
            fi
          } > /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG_NAME}" \
            --notes-file /tmp/release_notes.md \
            ./artifacts/beebjit-linux-x86_64 \
            ./artifacts/beebjit-headless-linux-x86_64 \
            ./artifacts/beebjit-windows-x86_64.exe \
            ./artifacts/beebjit-headless-windows-x86_64.exe
